<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sınav Portalı</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f4f8;
      margin: 0;
      padding: 10px;
      display: flex;
      justify-content: center;
      padding-bottom: 80px;
    }

    .app-shell {
      width: 100%;
      max-width: 860px;
    }

    .menu-container, .quiz-container {
      background: #fff;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 100%;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }

    .menu-btn {
      border: none;
      border-radius: 12px;
      padding: 20px;
      text-align: left;
      cursor: pointer;
      background: linear-gradient(135deg, #007bff, #0056b3);
      color: white;
    }

    .menu-btn.locked {
      background: linear-gradient(135deg, #6c757d, #495057);
      cursor: not-allowed;
      order: 999;
      opacity: 0.85;
    }

    .quiz-container {
      display: none;
      position: relative;
      padding-top: 85px;
      min-height: 100vh;
    }

    .progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 6px;
      background: #28a745;
      transition: 0.3s;
      width: 0%;
      border-radius: 14px 14px 0 0;
    }

    .main-menu-btn {
      border: none;
      background: none;
      cursor: pointer;
      font-weight: bold;
      font-size: calc(1rem + 4pt);
      color: #333;
      padding: 5px 0;
    }

    .retry-badge {
      display: none;
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffe69c;
      font-weight: bold;
      font-size: 0.95rem;
    }

    .question-title {
      margin-top: 0;
      margin-bottom: 16px;
      line-height: 1.45;
      font-size: 1.2rem;
      color: #222;
    }

    .option-btn {
      width: 100%;
      padding: 16px;
      margin-bottom: 12px;
      border-radius: 12px;
      border: 2px solid #e9ecef;
      background: #f8f9fa;
      text-align: left;
      cursor: pointer;
      font-size: 1.05rem;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s ease;
      position: relative;
    }

    .option-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    }

    .option-btn:disabled {
      cursor: default;
    }

    .option-btn.correct {
      background: #d4edda !important;
      border-color: #28a745 !important;
      color: #155724 !important;
      font-weight: bold;
    }

    .option-btn.wrong {
      background: #f8d7da !important;
      border-color: #dc3545 !important;
      color: #721c24 !important;
      font-weight: bold;
    }

    .tick {
      display: inline-block;
      margin-left: 10px;
      color: #1f9d45;
      font-weight: bold;
      opacity: 0;
      transform: scale(0.4);
    }

    .tick.show {
      animation: popTick 0.45s ease forwards;
    }

    @keyframes popTick {
      0%   { opacity: 0; transform: scale(0.4); }
      60%  { opacity: 1; transform: scale(1.2); }
      100% { opacity: 1; transform: scale(1); }
    }

    .explanation {
      display: none;
      margin-top: 20px;
      padding: 15px;
      background: #eaf2f8;
      border-left: 5px solid #2980b9;
      border-radius: 8px;
      line-height: 1.5;
    }

    .nav-controls {
      display: flex;
      gap: 12px;
      margin-top: 25px;
    }

    .nav-btn {
      flex: 1;
      padding: 18px;
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .next-btn { background: #007bff; }
    .prev-btn {
      background: #e9ecef;
      color: #dc3545 !important;
      border: 1px solid #ddd;
    }

    .quiz-footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid #eee;
      color: #666;
      font-weight: bold;
      font-size: 0.9rem;
      flex-wrap: wrap;
    }

    .disclaimer-box {
      margin-top: 20px;
      padding: 15px;
      background: #fdfdfd;
      border: 1px solid #eee;
      border-radius: 10px;
      color: #888;
      font-size: 0.8rem;
      line-height: 1.4;
      text-align: center;
    }

    .disclaimer-title {
      display: block;
      font-weight: bold;
      color: #555;
      margin-bottom: 5px;
      text-transform: uppercase;
      font-size: 0.7rem;
    }

    .source-tag {
      position: fixed;
      bottom: 8px;
      left: 8px;
      background: rgba(0, 0, 0, 0.05);
      color: #777;
      padding: 5px 10px;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: bold;
      z-index: 9999;
    }

    .reset-set-btn {
      position: absolute;
      top: 15px;
      right: 20px;
      background: #ffc107;
      border: none;
      padding: 8px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 0.8rem;
      cursor: pointer;
      z-index: 5;
    }


    .header-info {
      position:absolute;
      top:15px;
      left:20px;
      right:20px;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
    }

    .header-title-wrap {
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      min-width:0;
      flex:1 1 220px;
    }

    #headerSubject {
      margin-left:0 !important;
      margin-top:6px;
      font-weight:normal;
      color:#777;
      display:block;
      word-break:break-word;
      line-height:1.25;
    }

    @media (max-width: 480px) {
      .quiz-container {
        padding-top: 120px;
      }

      .header-info {
        top:12px;
        left:12px;
        right:12px;
        gap:8px;
      }

      .header-title-wrap {
        flex:1 1 100%;
      }

      .main-menu-btn {
        font-size: 1.7rem;
        line-height:1.1;
      }

      #headerSubject {
        font-size: 0.95rem;
        max-width: calc(100vw - 150px);
      }

      .reset-set-btn {
        position:absolute;
        top:12px;
        right:12px;
      }
    }

    @media (max-width: 480px) {
      .header-info {
        flex-direction: column;
        align-items: flex-start !important;
        gap: 10px;
      }

      .question-title {
        font-size: 1.05rem;
      }

      .option-btn {
        font-size: 1rem;
        padding: 14px;
      }

      .reset-set-btn {
        top: 12px;
        right: 12px;
        font-size: 0.75rem;
        padding: 7px 8px;
      }
    }
  </style>
</head>
<body>

<div class="app-shell">
  <div id="menuContainer" class="menu-container">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:20px;">
      <h1 id="mainTitle" style="margin:0;">Yükleniyor...</h1>
      <button onclick="clearAllStatistics()" style="background:#dc3545; color:white; border:none; padding:8px 10px; border-radius:8px; cursor:pointer; font-size:0.75rem;">
        Verileri Sıfırla
      </button>
    </div>

    <div id="menuGrid" class="menu-grid"></div>

    <div class="disclaimer-box">
      <span class="disclaimer-title">⚠️ Önemli Uyarı</span>
      Bu sistemde yer alan içerikler yalnızca eğitim amaçlıdır. İçeriklerin kullanımından doğabilecek doğrudan veya dolaylı hiçbir sorumluluk kabul edilmez. Tüm kullanım sorumluluğu kullanıcıya aittir.
    </div>
  </div>

  <div id="quizContainer" class="quiz-container">
    <div class="progress-bar" id="progressBar"></div>

    <div class="header-info">
      <div class="header-title-wrap">
        <button onclick="showMenu()" class="main-menu-btn">☰ Ana Menü</button>
        <span id="headerSubject"></span>
      </div>
    </div>

    <button onclick="resetCurrentSet()" class="reset-set-btn">Seti Sıfırla</button>

    <div id="retryBadge" class="retry-badge">Yalnış cevaplanan soru</div>
    <h2 id="questionText" class="question-title">...</h2>

    <div id="optionsArea"></div>

    <div class="quiz-footer">
      <div id="footerLeft">Kalan: 0</div>
      <div id="footerRight">0 / 0</div>
    </div>

    <div id="explanationArea" class="explanation"></div>

    <div class="nav-controls">
      <button id="prevBtn" class="nav-btn prev-btn" onclick="goBack()" style="visibility:hidden;">❮ Önceki</button>
      <button id="nextBtn" class="nav-btn next-btn" onclick="goForward()" style="visibility:hidden;">Yeni Soru ❯</button>
    </div>
  </div>
</div>

<div class="source-tag" id="sourceTag">Kaynak: ...</div>

<script>
  const CURRENT_SUBJECT = "Su Ürünleri Kanun ve Yönetmelikler";
  const SOURCE_TEXT = "Kaynak: gysmerkezi ve akademi anonim geminiden üretilmiştir";
  const QUESTIONS_PER_SET = 30;

  /*
    SORU FORMATI:
    q = soru metni
    o = seçenekler
    c = doğru seçeneğin index numarası
    e = açıklama

    c alanı:
    A = 0
    B = 1
    C = 2
    D = 3
  */

  const questions = [
  {
    "q": "SORU-1: Yönetmeliğin dayandığı 22/03/1971 gün ve 1380 sayılı kanun aşağıdakilerden hangisidir?",
    "o": [
      "A) Yabancı Sermaye Kanunu",
      "B) Su Ürünleri Kanunu",
      "C) Deniz Elverişlilik Kanunu",
      "D) Tonilato Kanunu"
    ],
    "c": 1,
    "e": "B - Metinde açıkça, 'Bu Yönetmelik 22/03/1971 gün ve 1380 sayılı Su Ürünleri Kanununa dayanılarak hazırlanmıştır' denilmektedir."
  },
  {
    "q": "SORU-2: Aşağıdaki kavramları doğru tanımlarıyla eşleştiriniz.<br>I. Su Ürünleri<br>II. Su Ürünleri Müstahsilleri<br>III. İstihsal Yerleri<br>a) Ticari amaçla deniz ve iç sularda su ürünleri istihsal eden kaptan, balıkçı reisi, balıkçı ve tayfa gibi gerçek kişiler ile tüzel kişileri, bunların ortak ve çalışanları ile su ürünleri yetiştiricilerini ifade eder.<br>b) Denizler, iç sular ve tesislerde tabii veya sun'i olarak istihsal edilen, yetiştirilen hayvanlarla bunlardan imal edilen ürünleri ifade eder.<br>c) Su ürünlerinin yetiştirildiği ve doğal olarak ürediği, avlanma, üretim, yetiştirme ve istihsal yapılmak üzere su sahalarını ifade eder.",
    "o": [
      "A) I-b, II-a, III-c",
      "B) I-a, II-c, III-b",
      "C) I-c, II-b, III-a",
      "D) I-b, II-c, III-a"
    ],
    "c": 0,
    "e": "A - Metindeki 'Tanımlar' (Madde 3) bölümünde geçen Su Ürünleri, Su Ürünleri Müstahsilleri ve İstihsal Yerleri kavramlarının doğrudan eşleşmesidir."
  },
  {
    "q": "SORU-3: Yönetmelikte 'Alttan büzülmeyen, voli ağları olarak da adlandırılan çevirme ağları' olarak tanımlanan istihsal vasıtası aşağıdakilerden hangisidir?",
    "o": [
      "A) Gırgır Ağları",
      "B) Uzatma Ağları",
      "C) Alamana Ağları",
      "D) Sürütme Ağları"
    ],
    "c": 2,
    "e": "C - Alamana Ağları metinde tam olarak 'Alttan büzülmeyen, voli ağları olarak da adlandırılan çevirme ağları' şeklinde ifade edilmiştir."
  },
  {
    "q": "SORU-4: Aşağıdakilerden hangisi 'Ağgözü Açıklığı' kavramının ölçüm metodunu Yönetmelik metnine göre tam ve doğru olarak ifade eder?",
    "o": [
      "A) Ağ ıslakken, ağ ipinin kalınlığı da dahil edilerek ölçülen mesafedir.",
      "B) Ağ kuru iken gergin halde birbirine karşılıklı iki düğüm arasındaki mesafedir.",
      "C) Ağın akış yönü dikkate alınarak, birbirini takip eden yirmi ağ gözünde yapılan ölçümün ortalamasıdır.",
      "D) Ağ ıslakken birbirini takip eden on ağ gözünde yapılan ölçümün ortalamasıdır."
    ],
    "c": 2,
    "e": "C - Ağgözü açıklığı tanımında ölçüm metodolojisi olarak, 'Ağın akış yönü dikkate alınarak, birbirini takip eden yirmi ağ gözünde yapılan ölçümün ortalamasını' ifade ettiği metin içinde kesin olarak belirtilmiştir."
  },
  {
    "q": "SORU-5: Gemide çalışanlardan belli bir yaş aralığında olanlar ruhsat almaksızın balıkçı yardımcısı olarak çalıştırılabilirler. Bu istisna için belirlenen yaş aralığı ve çalışan oran sınırı aşağıdakilerden hangisinde doğru verilmiştir?",
    "o": [
      "A) 18-20 yaş arasında olup toplam çalışanların %10'unu geçmemek üzere",
      "B) 16-18 yaş arasında olup toplam çalışanların %20'sini geçmemek üzere",
      "C) 14-16 yaş arasında olup toplam çalışanların %25'ini geçmemek üzere",
      "D) 15-18 yaş arasında olup toplam çalışanların %30'unu geçmemek üzere"
    ],
    "c": 1,
    "e": "B - Metnin 4. Maddesinde 'Ancak gemide toplam çalışanların %20 sini geçmemek üzere, 16-18 yaş arasındaki balıkçı yardımcıları ruhsat almaksızın çalıştırılabilir' ibaresi yer almaktadır."
  },
  {
    "q": "SORU-6: Ruhsat tezkerelerinin süreleriyle ilgili metinde yer alan aşağıdaki ifadelerden hangisi yanlıştır?",
    "o": [
      "A) Denizlerde avcılık yolu ile istihsalde bulunacak tüzel kişiler için ruhsat tezkerelerinin süresi iki yıldır.",
      "B) İç sularda su ürünleri istihsalinde kullanılacak balıkçı gemilerinin ruhsat tezkeresi süresi istihsal yapılacak kaynağın kiralama süresi kadardır.",
      "C) Denizlerde ve iç sularda gerçek kişiler için düzenlenen ruhsat tezkerelerinin süresi beş yıldır.",
      "D) Süresi biten ruhsat tezkerelerinin vize işlemi yapılmaması halinde bu tezkereler beş yılın sonunda iptal edilir."
    ],
    "c": 3,
    "e": "D - Metinde vize işlemi yapılmayan ruhsatların iptal süresi beş yıl değil, 'üç yıl' (Süresinin sona erdiği tarihten itibaren üç yıl boyunca vize işlemi yapılmayan ruhsat tezkereleri iptal edilir) olarak belirtilmiştir."
  },
  {
    "q": "SORU-7: Ortaklarının tamamı Türk vatandaşı olmayan tüzel kişiler Ruhsat Tezkeresi alma şartlarıyla ilgili nasıl bir istisnaya tabidir?",
    "o": [
      "A) Hiçbir şartta ruhsat tezkeresi alamazlar.",
      "B) Sadece denize elverişlilik belgesi ibraz ederek alabilirler.",
      "C) Yabancı Sermaye Mevzuatına uygun kurulmuş tüzel kişiliklere, projeleri ve teknik yeterlilikleri Bakanlıkça onaylanmak kaydı ile verilebilir.",
      "D) Sadece iç sularda istihsal yapacaklarsa il müdürlüğünün onayıyla alabilirler."
    ],
    "c": 2,
    "e": "C - 'Ortaklarının tamamı Türk vatandaşı olmayan tüzel kişiler Ruhsat Tezkeresi alamazlar. Ancak, Yabancı Sermaye Mevzuatına uygun olarak kurulmuş tüzel kişiliklere... Ruhsat Tezkeresi verilebilir.' ibaresi mevcuttur."
  },
  {
    "q": "SORU-8: Aşağıdaki kavramları doğru tanımlarıyla eşleştiriniz.<br>I. Atık<br>II. Alıcı Su<br>III. Atık Su<br>a) Evsel, endüstriyel, tarımsal ve diğer kullanımlar sonucu kirlenmiş ve özellikleri değişmiş suları ifade eder.<br>b) Atık suların boşaltıldığı göl, baraj, dere, akarsu, yeraltı suları, kıyı deniz veya diğer su kaynaklarını ifade eder.<br>c) Fiziksel, kimyasal ve biyolojik özellikleriyle karıştıkları alıcı sulara da dolaylı veya doğrudan zarar verebilen maddelerle enerjilerini ifade eder.",
    "o": [
      "A) I-b, II-c, III-a",
      "B) I-c, II-b, III-a",
      "C) I-a, II-c, III-b",
      "D) I-c, II-a, III-b"
    ],
    "c": 1,
    "e": "B - Tanımlar kısmında Atık (c), Alıcı Su (b) ve Atık Su (a) terimlerinin birebir resmi tanımlarıdır."
  },
  {
    "q": "SORU-9: Ruhsat tezkeresi almak üzere müracaat eden gerçek kişilerden aşağıdakilerden hangisinin ibraz edilmesi istenmez?",

      "A) T.C. kimlik numarası yazılı beyanı",

    "e": "D - Ruhsat tezkeresi almak için Türk vatandaşı olmak, 18 yaşını bitirmiş bulunmak vb. şartlar (Madde 5) belirtilmiştir ancak başvuru aşamasında kooperatif üyelik belgesi talep edilmemektedir."

    "c": 0,
    "e": "A - Metindeki tanıma göre istihsal sahalarında suyun dibine veya içine çökertilmek suretiyle kullanılan vasıtalar doğrudan Çökertme Ağlarıdır."
  },
  {
    "q": "SORU-11: İstihsal yerlerinde barınak, mendirek, set, sun'i ada gibi tesislerin yapılması veya kurutulması/doldurulması hususunda ilgili kuruluşların izninden önce Bakanlığın olumlu görüşünün alınması zorunludur. Bu görüşü belirlemek üzere mahallinde inceleme yapacak komisyon asgari kaç teknik elemandan oluşmalıdır?",
    "o": [
      "A) En az iki teknik elemandan",
      "B) En az üç teknik elemandan",
      "C) En az dört teknik elemandan",
      "D) En az beş teknik elemandan"
    ],
    "c": 1,
    "e": "B - Metnin 7. Maddesinde 'Bakanlığın görüşü, en az ilgili üç teknik elemandan oluşacak bir komisyonca mahallinde inceleme yapılarak belirlenir' şeklinde ifade edilmiştir."
  },
  {
    "q": "SORU-12: Doğal göl, baraj gölü ve akarsu gibi su ürünleri istihsal yerlerinden sulama ve diğer amaçlarla yararlanmak için kullanılan kanal ve arkların başlangıç kısımlarına yerleştirilmesi zorunlu olan donanım aşağıdakilerden hangisidir?",
    "o": [
      "A) Balık asansörleri",
      "B) İzotermik depolar",
      "C) Balık perdeleri",
      "D) Izgara veya kafes"
    ],
    "c": 3,
    "e": "D - 8. Maddede kanal ve arkların başlangıç kısımlarına 'uygun bir ızgara veya kafes' konulmasının zorunlu olduğu belirtilmiştir."
  },
  {
    "q": "SORU-13: Aşağıda verilen su ürünleri avlanma yöntemleri veya vasıtalarından hangisinin kullanımı Yönetmelikte kesin olarak yasaklanmamış olup 'Bakanlığın iznine' bağlanmıştır?",
    "o": [
      "A) Bomba, torpil ve mayın kullanımı",
      "B) Elektrik cereyanı, elektroşok veya hava basıncı kullanımı",
      "C) Sönmemiş kireç kullanımı",
      "D) Uyuşturucu ve zehirleyici madde kullanımı"
    ],
    "c": 1,
    "e": "B - Yönetmeliğin 9. Maddesinde diğerleri doğrudan yasaklanmışken; 'Elektrik cereyanı, elektroşok veya hava basıncı ile su ürünleri avlanması Bakanlık iznine bağlıdır' denilmektedir."

    Object.keys(localStorage).forEach(k => {
      if (k.startsWith(storagePrefix())) localStorage.removeItem(k);
    });
    sessionStorage.setItem("session_active", "true");
  }

  let currentQuestions = [];
  let currentIndex = 0;
  let solvedIndex = -1;
  let userAnswers = {};
  let currentSetKey = "";
  let stats = { correct: 0, wrong: 0 };

  function storagePrefix() {
    return "exam_" + CURRENT_SUBJECT.replace(/\s+/g, "_") + "_";
  }

  function setStateKey(index) {
    return storagePrefix() + "state_set_" + index;
  }

  function normalizeQuestion(q, originalIndex) {
    return {
      id: q.id || ("q_" + originalIndex + "_" + Math.random().toString(36).slice(2, 8)),
      originalNo: originalIndex + 1,
      q: q.q,
      o: [...q.o],
      c: q.c,
      e: q.e || "",
      isRetry: q.isRetry || false,
      retryFrom: q.retryFrom || null,
      retryCount: q.retryCount || 0,
      answeredCorrectly: q.answeredCorrectly || false
    };
  }

  function initMenu() {
    const menuGrid = document.getElementById("menuGrid");
    menuGrid.innerHTML = "";

    const totalSets = Math.ceil(questions.length / QUESTIONS_PER_SET);

    // 300 ve üzeri soruda setleri 2'şer birleştir
    const combineSets = questions.length >= 300;
    const setsPerButton = combineSets ? 2 : 1;

    // Güvenlik: 10 buton sınırı
    const buttonCount = Math.min(10, Math.ceil(totalSets / setsPerButton));

    for (let i = 0; i < buttonCount; i++) {
      const startSetNo = i * setsPerButton + 1;
      const endSetNo = Math.min(startSetNo + setsPerButton - 1, totalSets);

      const start = (startSetNo - 1) * QUESTIONS_PER_SET;
      const end = Math.min(endSetNo * QUESTIONS_PER_SET, questions.length);

      if (start >= questions.length) continue;

      const key = setStateKey(i);

      const saved = JSON.parse(localStorage.getItem(key) || "null");
      const solved = saved ? Object.keys(saved.userAnswers || {}).length : 0;
      const correct = saved?.stats?.correct || 0;
      const wrong = saved?.stats?.wrong || 0;

      const totalCurrent = saved?.currentQuestions?.length || (end - start);
      const isCompleted = saved ? (solved >= totalCurrent && totalCurrent > 0) : false;

      const btn = document.createElement("button");
      btn.className = `menu-btn ${isCompleted ? "locked" : ""}`;

      const label = startSetNo === endSetNo
        ? `Deneme ${startSetNo}`
        : `Deneme ${startSetNo}-${endSetNo}`;

      btn.innerHTML = `
        <strong>${label}</strong><br>
        <small>${end - start} Soru | Çözülen ${solved} (Doğru ${correct} Yanlış ${wrong})</small>
      `;

      if (!isCompleted) {
        btn.onclick = () => startSet(i, key, start, end);
      }

      menuGrid.appendChild(btn);
    }
  }

  function startSet(idx, key, start, end) {
    currentSetKey = key;

    const saved = JSON.parse(localStorage.getItem(key) || "null");

    if (saved) {
      currentQuestions = saved.currentQuestions;
      currentIndex = saved.currentIndex;
      solvedIndex = saved.solvedIndex;
      userAnswers = saved.userAnswers || {};
      stats = saved.stats || { correct: 0, wrong: 0 };
    } else {
      currentQuestions = questions.slice(start, end).map((q, i) => normalizeQuestion(q, start + i));
      currentIndex = 0;
      solvedIndex = -1;
      userAnswers = {};
      stats = { correct: 0, wrong: 0 };
      saveState();
    }

    document.getElementById("menuContainer").style.display = "none";
    document.getElementById("quizContainer").style.display = "block";
    document.getElementById("headerSubject").textContent = CURRENT_SUBJECT;
    loadQuestion();
    window.scrollTo(0, 0);
  }

  function getQuestionTitle(q) {
    return q.q;
  }

  function loadQuestion() {
    const q = currentQuestions[currentIndex];
    const progress = ((currentIndex + 1) / currentQuestions.length) * 100;

    document.getElementById("progressBar").style.width = progress + "%";
    document.getElementById("footerLeft").textContent = `Kalan: ${Math.max(currentQuestions.length - (currentIndex + 1), 0)}`;
    document.getElementById("footerRight").textContent = `${currentIndex + 1} / ${currentQuestions.length}`;
    document.getElementById("questionText").innerHTML = getQuestionTitle(q);

    const retryBadge = document.getElementById("retryBadge");
    retryBadge.style.display = q.isRetry ? "block" : "none";

    const optArea = document.getElementById("optionsArea");
    const expArea = document.getElementById("explanationArea");
    optArea.innerHTML = "";
    expArea.style.display = "none";
    expArea.innerHTML = "";

    const letters = ["A", "B", "C", "D"];

    q.o.forEach((opt, idx) => {
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.innerHTML = `<strong>${letters[idx]})</strong> ${opt}`;

      if (currentIndex <= solvedIndex) {
        btn.disabled = true;
        const userChoice = userAnswers[currentIndex];

        if (idx === userChoice) {
          if (userChoice === q.c) {
            btn.classList.add("correct");
            btn.innerHTML += ` <span class="tick show">✔</span>`;
          } else {
            btn.classList.add("wrong");
          }
        }

        if (userChoice === q.c) {
          expArea.innerHTML = `<strong>Açıklama:</strong> ${q.e}`;
          expArea.style.display = "block";
        } else if (q.isRetry) {
          if (idx === q.c) {
            btn.classList.add("correct");
            btn.innerHTML += ` <span class="tick show">✔</span>`;
          }
          expArea.innerHTML = `<strong>Açıklama:</strong> ${q.e}`;
          expArea.style.display = "block";
        }
      } else {
        btn.onclick = () => selectOption(idx);
      }

      optArea.appendChild(btn);
    });

    document.getElementById("prevBtn").style.visibility = currentIndex > 0 ? "visible" : "hidden";
    document.getElementById("nextBtn").style.visibility = currentIndex <= solvedIndex ? "visible" : "hidden";
  }

  function selectOption(idx) {
    const q = currentQuestions[currentIndex];
    const isCorrect = idx === q.c;

    userAnswers[currentIndex] = idx;
    solvedIndex = Math.max(solvedIndex, currentIndex);

    if (isCorrect) {
      stats.correct++;
      q.answeredCorrectly = true;
    } else {
      stats.wrong++;

      if (!q.isRetry) {
        const retryQuestion = {
          ...q,
          isRetry: true,
          retryFrom: q.originalNo,
          retryCount: 1
        };

        const insertIndex = Math.min(currentIndex + 6, currentQuestions.length);
        currentQuestions.splice(insertIndex, 0, retryQuestion);
      }
    }

    saveState();
    loadQuestion();
  }

  function saveState() {
    localStorage.setItem(currentSetKey, JSON.stringify({
      currentQuestions,
      currentIndex,
      solvedIndex,
      userAnswers,
      stats
    }));
  }

  function goForward() {
    if (currentIndex < solvedIndex) {
      currentIndex++;
    } else if (currentIndex < currentQuestions.length - 1) {
      currentIndex++;
    } else {
      return showMenu();
    }

    saveState();
    loadQuestion();
    window.scrollTo(0, 0);
  }

  function goBack() {
    if (currentIndex > 0) {
      currentIndex--;
      saveState();
      loadQuestion();
      window.scrollTo(0, 0);
    }
  }

  function showMenu() {
    document.getElementById("quizContainer").style.display = "none";
    document.getElementById("menuContainer").style.display = "block";
    initMenu();
    window.scrollTo(0, 0);
  }

  function clearAllStatistics() {
    if (confirm("Tüm veriler sıfırlansın mı?")) {
      Object.keys(localStorage).forEach(k => {
        if (k.startsWith(storagePrefix())) localStorage.removeItem(k);
      });
      initMenu();
    }
  }

  function resetCurrentSet() {
    if (confirm("Bu set sıfırlansın mı?")) {
      localStorage.removeItem(currentSetKey);
      showMenu();
    }
  }

  initMenu();
</script>
